<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Reading — Manan Agarwal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌀</text></svg>">
<style>
  body { max-width: 920px; }

  .back-link {
    display: inline-block;
    margin-bottom: 1rem;
    font-size: 0.9rem;
  }

  .subtitle {
    color: #888;
    font-size: 0.95rem;
    margin-top: -0.5rem;
    margin-bottom: 2.5rem;
  }

  .year-heading {
    font-family: Palatino, "Palatino Linotype", "Palatino LT STD", "Book Antiqua", Cambria, Georgia, serif;
    font-size: 1.5rem;
    font-weight: normal;
    color: #000;
    margin-top: 3rem;
    margin-bottom: 0.75rem;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid #e0e0e0;
  }

  .book-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .book-item {
    position: relative;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.65rem 0;
    border-bottom: 1px solid #f0f0f0;
  }

  .book-item:last-child {
    border-bottom: none;
  }

  .book-title-block {
    flex: 1.5;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
  }

  .book-title {
    font-size: 0.95rem;
    color: #222;
  }

  .book-crown {
    position: absolute;
    left: -22px;
    top: 50%;
    transform: translateY(-50%);
  }

  .crown {
    color: #FFD700;
    font-size: 0.8rem;
    -webkit-text-stroke: 1px #000;
    paint-order: stroke fill;
  }

  .book-author {
    font-size: 0.8rem;
    color: #999;
  }

  .book-rating {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }

  .stars {
    display: inline-flex;
    gap: 1px;
    align-items: center;
    line-height: 1;
  }

  .star {
    color: #e0e0e0;
    font-size: 0.85rem;
    display: inline-block;
    position: relative;
    opacity: 0.9;
  }

  .star.full,
  .star.half {
    color: green;
  }


  .book-quote {
    flex: 2;
    font-size: 0.82rem;
    color: #999;
    font-style: italic;
    min-width: 0;
    padding: 0 0.5rem;
    line-height: 1.4;
  }


  @media (max-width: 620px) {
    .book-quote { display: none; }
    .book-item { gap: 0.5rem; }
  }
</style>
</head>

<body>

<a class="back-link" href="index.html">← back</a>

<h1>reading</h1>

<p class="subtitle" id="subtitle"></p>

<div id="reading-list"></div>

<footer>
Template from
(<a href="https://github.com/rishabh-ranjan/rishabh-ranjan.github.io">source</a>).
</footer>

<br>
<br>
<br>

<script>
function parseCSV(text) {
  const rows = [];
  let i = 0;
  while (i < text.length) {
    const row = [];
    while (i < text.length && text[i] !== '\n') {
      if (text[i] === '"') {
        i++;
        let cell = '';
        while (i < text.length) {
          if (text[i] === '"' && text[i + 1] === '"') { cell += '"'; i += 2; }
          else if (text[i] === '"') { i++; break; }
          else { cell += text[i++]; }
        }
        row.push(cell);
        if (text[i] === ',') i++;
      } else {
        let cell = '';
        while (i < text.length && text[i] !== ',' && text[i] !== '\n') {
          cell += text[i++];
        }
        row.push(cell.trim());
        if (text[i] === ',') i++;
      }
    }
    if (text[i] === '\n') i++;
    if (row.length > 1 || row[0]) rows.push(row);
  }
  return rows;
}

function makeStars(score) {
  const filled = Math.floor(score);
  const hasHalf = (score % 1) >= 0.5;
  let html = '<span class="stars">';
  for (let i = 1; i <= 5; i++) {
    if (i <= filled) html += '<i class="fas fa-star star full"></i>';
    else if (i === filled + 1 && hasHalf) html += '<i class="fas fa-star-half-alt star half"></i>';
    else html += '<i class="far fa-star star empty"></i>';
  }
  html += '</span>';
  return html;
}

fetch('reading.csv')
  .then(r => r.text())
  .then(text => {
    const rows = parseCSV(text);
    const headers = rows[0];
    const idx = {
      name:     headers.indexOf('Name'),
      author:   headers.indexOf('Author'),
      finished: headers.indexOf('Finished'),
      score:    headers.indexOf('Score'),
      quote:    headers.indexOf('Quote'),
    };

    const done = rows.slice(1)
      .filter(r => r[idx.finished] && r[idx.score])
      .map(r => ({
        name:   r[idx.name],
        author: r[idx.author].trim(),
        score:  parseFloat(r[idx.score]),
        quote:  idx.quote >= 0 ? (r[idx.quote] || '') : '',
        year:   new Date(r[idx.finished]).getFullYear(),
        date:   new Date(r[idx.finished]),
      }))
      .filter(r => !isNaN(r.year))
      .sort((a, b) => b.date - a.date);

    const byYear = {};
    done.forEach(b => {
      if (!byYear[b.year]) byYear[b.year] = [];
      byYear[b.year].push(b);
    });

    document.getElementById('subtitle').textContent = done.length + ' books read';

    const years = Object.keys(byYear).map(Number).sort((a, b) => b - a);
    const container = document.getElementById('reading-list');

    years.forEach(year => {
      const heading = document.createElement('div');
      heading.className = 'year-heading';
      heading.textContent = year;
      container.appendChild(heading);

      const ul = document.createElement('ul');
      ul.className = 'book-list';

      byYear[year].forEach(book => {
        const li = document.createElement('li');
        li.className = 'book-item';
        li.innerHTML =
          '<div class="book-crown">' + (book.score === 5 ? '<i class="fas fa-crown crown"></i>' : '') + '</div>' +
          '<div class="book-title-block">' +
            '<span class="book-title">' + book.name + '</span>' +
            '<span class="book-author">' + book.author + '</span>' +
          '</div>' +
          '<span class="book-quote">' + (book.quote ? '“' + book.quote + '”' : '') + '</span>' +
          '<span class="book-rating">' +
            makeStars(book.score) +
          '</span>';
        ul.appendChild(li);
      });

      container.appendChild(ul);
    });
  });
</script>

</body>

</html>
